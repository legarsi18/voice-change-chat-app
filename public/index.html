<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="作戦会議">
  <title>作戦会議</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>

  <!-- iOS バックグラウンド音声維持用（無音ループ） -->
  <audio id="keepalive" loop playsinline style="display:none">
    <source src="/silence.mp3" type="audio/mpeg">
  </audio>

  <script type="module" src="/js/app.js"></script>
  <script>
    // PWA インストール & iOS バックグラウンド対策
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // keepaliveはルーム入室時に app.js 側で開始する
  </script>
</body>
</html>
