name = "voice-chat-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["RoomDurableObject"]

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

# シークレットは以下コマンドで設定（wrangler.tomlには書かない）
# wrangler secret put CF_APP_ID
# wrangler secret put CF_APP_TOKEN
